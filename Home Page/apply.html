<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Application - Whispering Hills</title>
    <style>
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; }
        .radio-group { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="main">
        <h1>Application</h1>
        <div id="header"><a href="index.html">← Back to Home</a></div>
        
        <div id="contentColumn" style="width: 100%; padding: 20px;">
            <form onsubmit="submitApplication(event)">
                <div class="form-group">
                    <label>Applicant Type</label>
                    <input type="radio" name="type" value="Client" checked> Client
                    <input type="radio" name="type" value="Volunteer"> Volunteer
                    <input type="radio" name="type" value="Guardian"> Guardian
                </div>

                <div class="form-group"><label>Full Name *</label><input type="text" id="appName" required></div>
                <div class="form-group"><label>Email *</label><input type="email" id="appEmail" required></div>
                <div class="form-group"><label>Phone *</label><input type="text" id="appPhone" required></div>
                <div class="form-group"><label>Address *</label><input type="text" id="appAddress" required></div>
                <div class="form-group"><label>Skillset *</label><input type="text" id="appSkills" required></div>
                <div class="form-group"><label>Previous Experience</label><textarea id="appExp" rows="3"></textarea></div>
                <div class="form-group"><label>Availability *</label><input type="text" id="appAvail" placeholder="e.g. Weekends, weekday evenings" required></div>

                <button type="submit" style="background: #9B1313; color: white; padding: 10px 20px; border: none; cursor: pointer;">Submit Application</button>
            </form>
        </div>
    </div>

    <script>
        function submitApplication(e) {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const position = urlParams.get('job') || "General Interest";

            const newApp = {
                id: "user_" + Date.now(),
                name: document.getElementById('appName').value,
                email: document.getElementById('appEmail').value,
                position: position,
                skills: document.getElementById('appSkills').value,
                resume: document.getElementById('appExp').value,
                status: "Pending Review"
            };

            let apps = JSON.parse(localStorage.getItem('allApplications')) || [];
            apps.push(newApp);
            localStorage.setItem('allApplications', JSON.stringify(apps));

            alert("Application submitted successfully!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
