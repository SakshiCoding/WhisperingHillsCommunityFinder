<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<link rel="stylesheet" type="text/css" href="../style.css" />
	<title>Volunteer Application - Whispering Hills Community Finder</title>
	<style type="text/css">
		#main {
			margin: 0 auto;
			text-align: center;
		}

		#EventHostForm {
			max-width: 760px;
			margin: 0 auto;
		}

		#volunteerForm {
			max-width: 640px;
			margin: 0 auto;
			text-align: left;
		}

		#volunteerForm label {
			display: block;
			margin-top: 14px;
			margin-bottom: 6px;
		}

		#volunteerForm input[type="text"],
		#volunteerForm input[type="email"],
		#volunteerForm input[type="tel"],
		#volunteerForm textarea {
			display: block;
			width: 100%;
			box-sizing: border-box;
		}

		#volunteerForm input[type="submit"] {
			display: block;
			margin: 20px auto 0;
		}
	</style>
</head>
<body>
	<div id="main">
		<h1>Whispering Hills Community Finder</h1>
		<div id="header">
			<a href="../Home Page/index.html">Home</a>
			<a href="../Login Page/index.html">Log In</a>
			<a href="#">Sign Up</a>
		</div>

		<div id="EventHostForm">
			<h2>Volunteer Application Form</h2>
			<div class="divider"></div>

			<form id="volunteerForm">
				<label for="fullName">Full Name</label>
				<input type="text" id="fullName" name="fullName" required />

				<label for="email">Email Address</label>
				<input type="email" id="email" name="email" required />

				<label for="phone">Phone Number</label>
				<input type="tel" id="phone" name="phone" required />

				<label for="availability">Availability (Days/Times)</label>
				<input type="text" id="availability" name="availability" required />

				<label for="experience">Previous Volunteer Experience</label>
				<textarea id="experience" name="experience" rows="3" required></textarea>

				<label for="skills">Relevant Skills</label>
				<textarea id="skills" name="skills" rows="3" required></textarea>

				<label for="goodVolunteer">Why do you think you will be a good Volunteer for the Whispering Hill Community?</label>
				<textarea id="goodVolunteer" name="goodVolunteer" rows="4" required></textarea>

				<label for="teamQuestions">Do you have any questions for the Whispering Hills Team?</label>
				<textarea id="teamQuestions" name="teamQuestions" rows="4"></textarea>

				<input type="submit" value="Submit Volunteer Application" />
			</form>
		</div>
	</div>


	<script type="text/javascript">
		(function () {
			var user = localStorage.getItem('whcfUser');
			if (user !== 'user1') {
				alert('Only user1 can access the volunteer application form.');
				window.location.href = '../Home Page/index.html';
				return;
			}

			var form = document.getElementById('volunteerForm');
			form.addEventListener('submit', function (event) {
				event.preventDefault();
				alert('Thank you! Your volunteer application has been submitted.');
				form.reset();
			});
		})();
	</script>
	<script src="../shared/auth-nav.js"></script>
</body>
</html>
